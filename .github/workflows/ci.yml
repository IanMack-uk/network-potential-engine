name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          pytest -q

      - name: Affinity full pipeline transcript (v2)
        env:
          PYTHONPATH: src
        run: |
          python -m network_potential_engine.scripts.run_affinity_n50_full_pipeline_v2_transcript

      - name: Affinity smoke transcript (v1)
        env:
          PYTHONPATH: src
        run: |
          python -m network_potential_engine.scripts.run_affinity_n50_smoke_transcript_v1

      - name: Affinity product validity checks (v1)
        env:
          PYTHONPATH: src
        run: |
          python -m network_potential_engine.scripts.run_affinity_n50_product_validity_checks_v1

      - name: Affinity product validity checks (v2)
        env:
          PYTHONPATH: src
        run: |
          python -m network_potential_engine.scripts.run_affinity_n50_product_validity_checks_v2

      - name: Upload Affinity transcripts
        uses: actions/upload-artifact@v4
        with:
          name: affinity-n50-transcripts
          if-no-files-found: error
          path: |
            affinity/artifacts/n50/legacy/v1/smoke_run_transcript_v1.txt
            affinity/artifacts/n50/legacy/v1/product_validity_scenarios_v1.json
            affinity/artifacts/n50/legacy/v1/product_validity_outputs_v1.json
            affinity/artifacts/n50/legacy/v1/product_validity_evaluation_note_v1.txt

      - name: Upload Affinity v2 transcripts
        uses: actions/upload-artifact@v4
        with:
          name: affinity-n50-v2-transcripts
          if-no-files-found: error
          path: |
            affinity/artifacts/n50/generated/latest/full_pipeline_transcript_v2.txt
            affinity/artifacts/n50/generated/latest/smoke_run_transcript_v2.txt
            affinity/artifacts/n50/generated/latest/optionB_v2_audit_report.txt
            affinity/artifacts/n50/generated/latest/data_driven_full_audit_transcript_v2.txt

      - name: Upload Affinity v2 product validity
        uses: actions/upload-artifact@v4
        with:
          name: affinity-n50-v2-product-validity
          if-no-files-found: error
          path: |
            affinity/artifacts/n50/generated/latest/product_validity_scenarios_v2.json
            affinity/artifacts/n50/generated/latest/product_validity_outputs_v2.json
            affinity/artifacts/n50/generated/latest/product_validity_evaluation_note_v2.txt
